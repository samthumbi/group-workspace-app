<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Workspace</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { background: #333; color: white; padding: 20px; margin-bottom: 20px; border-radius: 5px; }
        h1 { margin-bottom: 10px; }
        .auth-section { background: white; padding: 20px; margin-bottom: 20px; border-radius: 5px; }
        .form-group { margin-bottom: 10px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 3px; font-size: 14px; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 3px; cursor: pointer; margin-right: 10px; }
        button:hover { background: #0056b3; }
        .hidden { display: none; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; background: #ddd; cursor: pointer; border: none; border-radius: 3px; }
        .tab-btn.active { background: #007bff; color: white; }
        .tab-content { background: white; padding: 20px; border-radius: 5px; }
        .task-item, .slot-item, .message-item { background: #f9f9f9; padding: 15px; margin-bottom: 10px; border-left: 4px solid #007bff; border-radius: 3px; }
        .task-item button, .slot-item button { background: #dc3545; padding: 5px 10px; font-size: 12px; }
        .message-box { height: 300px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; background: white; border-radius: 3px; }
        .message { margin-bottom: 10px; padding: 8px; background: #e3f2fd; border-radius: 3px; }
        .message strong { color: #007bff; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 Group Workspace</h1>
            <p>Collaborate with your team — Tasks, Timetable & Chat</p>
        </header>

        <!-- Auth Section -->
        <div class="auth-section" id="authSection">
            <h2>Login / Register</h2>
            <div class="form-group">
                <label>Name:</label>
                <input type="text" id="name" placeholder="Your name">
            </div>
            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="email" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Password:</label>
                <input type="password" id="password" placeholder="Password">
            </div>
            <div class="form-group">
                <label>Group Code:</label>
                <input type="text" id="groupCode" placeholder="e.g., GROUP123">
            </div>
            <button onclick="register()">Register</button>
            <button onclick="login()">Login</button>
        </div>

        <!-- Main App Section -->
        <div id="appSection" class="hidden">
            <p id="userInfo" style="background: #d4edda; padding: 10px; border-radius: 3px; margin-bottom: 20px;"></p>
            
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('tasks')">Tasks</button>
                <button class="tab-btn" onclick="switchTab('timetable')">Timetable</button>
                <button class="tab-btn" onclick="switchTab('chat')">Chat</button>
            </div>

            <!-- Tasks Tab -->
            <div id="tasksTab" class="tab-content">
                <h2>Tasks</h2>
                <div class="form-group">
                    <label>Task Title:</label>
                    <input type="text" id="taskTitle" placeholder="Task title">
                </div>
                <div class="form-group">
                    <label>Description:</label>
                    <textarea id="taskDesc" placeholder="Task description" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Assign To:</label>
                    <input type="text" id="taskAssign" placeholder="Team member name">
                </div>
                <div class="form-group">
                    <label>Deadline:</label>
                    <input type="date" id="taskDeadline">
                </div>
                <button onclick="createTask()">Add Task</button>
                <div id="tasksList" style="margin-top: 20px;"></div>
            </div>

            <!-- Timetable Tab -->
            <div id="timetableTab" class="tab-content hidden">
                <h2>Timetable</h2>
                <div class="form-group">
                    <label>Event Title:</label>
                    <input type="text" id="slotTitle" placeholder="Event title">
                </div>
                <div class="form-group">
                    <label>Day:</label>
                    <input type="text" id="slotDay" placeholder="e.g., Monday">
                </div>
                <div class="form-group">
                    <label>Start Time:</label>
                    <input type="time" id="slotStart">
                </div>
                <div class="form-group">
                    <label>End Time:</label>
                    <input type="time" id="slotEnd">
                </div>
                <button onclick="createSlot()">Add to Timetable</button>
                <div id="slotsList" style="margin-top: 20px;"></div>
            </div>

            <!-- Chat Tab -->
            <div id="chatTab" class="tab-content hidden">
                <h2>Group Chat</h2>
                <div class="message-box" id="messagesBox"></div>
                <div class="form-group">
                    <input type="text" id="messageInput" placeholder="Type a message...">
                </div>
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        let token = '';
        let userName = '';
        let groupCode = '';
        let socket;

        const API_URLS = {
            auth: 'http://localhost:3001',
            tasks: 'http://localhost:3002',
            timetable: 'http://localhost:3003',
            chat: 'http://localhost:3004'
        };

        function register() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const group = document.getElementById('groupCode').value;

            fetch(`${API_URLS.auth}/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password, groupCode: group })
            })
            .then(r => r.json())
            .then(data => alert(data.message || data.error))
            .catch(e => console.log(e));
        }

        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            fetch(`${API_URLS.auth}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            })
            .then(r => r.json())
            .then(data => {
                if (data.token) {
                    token = data.token;
                    userName = data.name;
                    groupCode = data.groupCode;
                    document.getElementById('authSection').classList.add('hidden');
                    document.getElementById('appSection').classList.remove('hidden');
                    document.getElementById('userInfo').textContent = `✅ Logged in as ${userName} (Group: ${groupCode})`;
                    loadTasks();
                    loadSlots();
                    initChat();
                } else {
                    alert(data.error);
                }
            })
            .catch(e => console.log(e));
        }

        function createTask() {
            const title = document.getElementById('taskTitle').value;
            const description = document.getElementById('taskDesc').value;
            const assignedTo = document.getElementById('taskAssign').value;
            const deadline = document.getElementById('taskDeadline').value;

            fetch(`${API_URLS.tasks}/tasks`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ title, description, assignedTo, deadline })
            })
            .then(r => r.json())
            .then(data => {
                loadTasks();
                document.getElementById('taskTitle').value = '';
                document.getElementById('taskDesc').value = '';
                document.getElementById('taskAssign').value = '';
                document.getElementById('taskDeadline').value = '';
            })
            .catch(e => console.log(e));
        }

        function loadTasks() {
            fetch(`${API_URLS.tasks}/tasks`, {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(r => r.json())
            .then(tasks => {
                let html = '';
                tasks.forEach(task => {
                    html += `
                        <div class="task-item">
                            <strong>${task.title}</strong> - ${task.status}
                            <p>${task.description}</p>
                            <p>Assigned to: ${task.assignedTo}</p>
                            <button onclick="updateTaskStatus('${task._id}', 'completed')">Mark Done</button>
                            <button onclick="deleteTask('${task._id}')">Delete</button>
                        </div>
                    `;
                });
                document.getElementById('tasksList').innerHTML = html || '<p>No tasks yet</p>';
            })
            .catch(e => console.log(e));
        }

        function updateTaskStatus(id, status) {
            fetch(`${API_URLS.tasks}/tasks/${id}`, {
                method: 'PATCH',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ status })
            })
            .then(() => loadTasks())
            .catch(e => console.log(e));
        }

        function deleteTask(id) {
            fetch(`${API_URLS.tasks}/tasks/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(() => loadTasks())
            .catch(e => console.log(e));
        }

        function createSlot() {
            const title = document.getElementById('slotTitle').value;
            const day = document.getElementById('slotDay').value;
            const startTime = document.getElementById('slotStart').value;
            const endTime = document.getElementById('slotEnd').value;

            fetch(`${API_URLS.timetable}/timetable`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ title, day, startTime, endTime })
            })
            .then(r => r.json())
            .then(data => {
                loadSlots();
                document.getElementById('slotTitle').value = '';
                document.getElementById('slotDay').value = '';
                document.getElementById('slotStart').value = '';
                document.getElementById('slotEnd').value = '';
            })
            .catch(e => console.log(e));
        }

        function loadSlots() {
            fetch(`${API_URLS.timetable}/timetable`, {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(r => r.json())
            .then(slots => {
                let html = '';
                slots.forEach(slot => {
                    html += `
                        <div class="slot-item">
                            <strong>${slot.title}</strong> - ${slot.day}
                            <p>${slot.startTime} to ${slot.endTime}</p>
                            <button onclick="deleteSlot('${slot._id}')">Delete</button>
                        </div>
                    `;
                });
                document.getElementById('slotsList').innerHTML = html || '<p>No timetable entries yet</p>';
            })
            .catch(e => console.log(e));
        }

        function deleteSlot(id) {
            fetch(`${API_URLS.timetable}/timetable/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(() => loadSlots())
            .catch(e => console.log(e));
        }

        function initChat() {
            socket = io(API_URLS.chat);
            socket.emit('join', groupCode);
            
            socket.on('receive_message', (message) => {
                displayMessage(message.sender, message.content);
            });

            loadChatMessages();
        }

        function sendMessage() {
            const content = document.getElementById('messageInput').value;
            if (!content) return;
            
            socket.emit('send_message', {
                sender: userName,
                content: content,
                groupCode: groupCode
            });
            document.getElementById('messageInput').value = '';
        }

        function loadChatMessages() {
            fetch(`${API_URLS.chat}/chat/messages`, {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(r => r.json())
            .then(messages => {
                let html = '';
                messages.forEach(msg => {
                    html += `<div class="message"><strong>${msg.sender}:</strong> ${msg.content}</div>`;
                });
                document.getElementById('messagesBox').innerHTML = html;
                document.getElementById('messagesBox').scrollTop = document.getElementById('messagesBox').scrollHeight;
            })
            .catch(e => console.log(e));
        }

        function displayMessage(sender, content) {
            const box = document.getElementById('messagesBox');
            const msg = document.createElement('div');
            msg.className = 'message';
            msg.innerHTML = `<strong>${sender}:</strong> ${content}`;
            box.appendChild(msg);
            box.scrollTop = box.scrollHeight;
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tab + 'Tab').classList.remove('hidden');
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
